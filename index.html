<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <article
        class="todo-card"
        data-testid="test-todo-card"
        aria-labelledby="todo-title"
      >
        <div class="todo-card__check-row">
          <input
            id="todo-complete-toggle"
            class="todo-card__checkbox"
            data-testid="test-todo-complete-toggle"
            type="checkbox"
            aria-describedby="todo-status"
          />
          <label for="todo-complete-toggle" class="todo-card__checkbox-label">
            Mark task complete
          </label>
        </div>

        <div class="todo-card__body">
          <h2
            id="todo-title"
            class="todo-card__title"
            data-testid="test-todo-title"
          >
            Finalize onboarding flow copy for mobile
          </h2>
          <p
            class="todo-card__description"
            data-testid="test-todo-description"
          >
            Review the latest notes, tighten the empty states, and send the
            final version to design before sign-off.
          </p>
        </div>

        <div class="todo-card__meta" role="group" aria-label="Task metadata">
          <span
            class="badge badge--priority"
            data-testid="test-todo-priority"
            aria-label="Priority: High"
          >High</span>
          <span
            id="todo-status"
            class="badge badge--status"
            data-testid="test-todo-status"
            aria-label="Status: In Progress"
          >In Progress</span>
        </div>

        <section class="todo-card__dates" aria-label="Due date information">
          <time
            class="todo-card__due-date"
            data-testid="test-todo-due-date"
            datetime="2026-04-18T18:00:00.000Z"
          >Due Apr 18, 2026 — 6:00 PM UTC</time>
          <time
            class="todo-card__time-remaining"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
            datetime="2026-04-18T18:00:00.000Z"
          >Calculating...</time>
        </section>

        <ul
          class="todo-card__tags"
          data-testid="test-todo-tags"
          role="list"
          aria-label="Task tags"
        >
          <li class="tag" data-testid="test-todo-tag-work">work</li>
          <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
          <li class="tag">design</li>
        </ul>

        <div class="todo-card__actions">
          <button
            type="button"
            class="action-button"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >Edit</button>
          <button
            type="button"
            class="action-button action-button--danger"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >Delete</button>
        </div>
      </article>
    </main>
    <script type="module" src="./script.js"></script>
  </body>
</html>
